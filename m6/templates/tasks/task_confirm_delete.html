{% extends 'base.html' %}
{% block title %}Delete Task — SaaS Platform{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill display-4 text-danger"></i>
                <h3 class="mt-3">Delete Task?</h3>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ task.title }}"</strong>? This cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'project_detail' task.project.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
